name: 실거래 수집 배치

on:
  schedule:
    # 매일 04:00 KST (= 19:00 UTC). 국토부 실거래 갱신 반영.
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      ym:
        description: "수집 년월 (YYYYMM). 비우면 당월+전월"
        required: false
        type: string

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: 실거래 수집 → D1 적재
        env:
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # 입력값은 셸에 직접 보간하지 않고 env 변수로 받아 injection 방지
          INPUT_YM: ${{ inputs.ym }}
        run: |
          if [ -n "$INPUT_YM" ]; then
            node ingest.mjs --remote --ym="$INPUT_YM"
          else
            node ingest.mjs --remote
          fi
